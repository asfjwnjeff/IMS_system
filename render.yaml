services:
  - type: web
    name: ims-insurance-system
    env: node
    region: singapore
    plan: free
    buildCommand: pnpm install --no-frozen-lockfile && pnpm build
    startCommand: pnpm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
    autoDeploy: true
